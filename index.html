<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>English B2 Checklist</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1d2e 0%, #12141f 100%);
      border-bottom: 1px solid #2a2d42;
      padding: 48px 20px 20px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.18em;
      color: #6c70a0;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 16px;
    }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .bar-wrap {
      flex: 1;
      height: 6px;
      border-radius: 99px;
      background: #1e2035;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #5b6af0, #9b6af0);
      transition: width 0.4s ease;
    }

    .progress-label {
      font-size: 12px;
      color: #9b9ec4;
      white-space: nowrap;
    }

    .progress-label span {
      color: #7c82f0;
      font-weight: 600;
    }

    .filters {
      display: flex;
      gap: 8px;
      padding: 14px 20px 0;
      max-width: 640px;
      margin: 0 auto;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 99px;
      border: none;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      background: #1e2035;
      color: #6c70a0;
    }

    .filter-btn.active {
      background: #5b6af0;
      color: #fff;
    }

    .list {
      max-width: 640px;
      margin: 0 auto;
      padding: 14px 20px 60px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid #1e2035;
      background: #14161f;
      cursor: pointer;
      transition: all 0.18s ease;
      width: 100%;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
    }

    .item.done {
      border-color: #2e3560;
      background: #161a2e;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid #2a2d42;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.18s;
    }

    .item.done .checkbox {
      border-color: #5b6af0;
      background: #5b6af0;
    }

    .checkmark {
      display: none;
    }

    .item.done .checkmark {
      display: block;
    }

    .label {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
      color: #c8cbea;
      transition: all 0.18s;
    }

    .item.done .label {
      color: #5a5e88;
      text-decoration: line-through;
      font-weight: 400;
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #3a3d58;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .item.done .badge {
      color: #5b6af0;
    }

    .empty {
      text-align: center;
      color: #6c70a0;
      font-size: 14px;
      margin-top: 48px;
    }
  </style>
</head>
<body>

<header>
  <div style="max-width:640px;margin:0 auto">
    <p class="eyebrow">English B2</p>
    <h1>Topic Checklist</h1>
    <div class="progress-row">
      <div class="bar-wrap">
        <div class="bar-fill" id="bar" style="width:0%"></div>
      </div>
      <p class="progress-label" id="progress-label">0 / 62 — <span>0%</span></p>
    </div>
  </div>
</header>

<div class="filters">
  <button class="filter-btn active" onclick="setFilter('all', this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('pending', this)">Pendientes</button>
  <button class="filter-btn" onclick="setFilter('done', this)">Hechos</button>
</div>

<div class="list" id="list"></div>

<script>
  const topics = [
    "Greetings and farewells",
    "Telephone language",
    "Present simple: affirmative",
    "Action verbs",
    "Present continuous",
    "Means of transport",
    "Stative verbs",
    "Travel and transport",
    "Listening comprehension",
    "Interrogative pronouns",
    "Present simple: negative",
    "Past simple: regular affirmative",
    "Past simple: irregular verbs",
    "'To be going to + infinitive'",
    "Uses of 'to be going to'",
    "Time expressions",
    "Typical expressions",
    "Consonant sounds: /ʧ/ and /ʃ/",
    "Dialogues",
    "Past simple",
    "Holidays",
    "Talking about holidays",
    "Talking about trips and holidays",
    "Mediation",
    "Present perfect",
    "Present perfect vs. past simple",
    "Present simple: interrogative and short answers",
    "Present simple vs. Present continuous",
    "Present continuous vs. 'Be going to'",
    "Possessive pronouns",
    "'There is' / 'there are'",
    "Possessive adjectives",
    "Can / Can't",
    "The imperative",
    "Vowel sounds: /i:/ and /i/",
    "Talking about the weather",
    "Descriptive texts",
    "Brochures and leaflets",
    "Past continuous",
    "Everyday objects",
    "Prepositions of movement",
    "For / Since / Ago",
    "'Have been' vs. 'have gone'",
    "'How long does it take...?'",
    "Clothes and accessories",
    "Interviews",
    "Agreeing with an opinion",
    "Vowel sounds: /eɪ/ and /æ/",
    "Fabrics",
    "Vowel sounds: /ɑ:/ and /ə/",
    "The use of 'yet' and 'already' in the present perfect",
    "The use of 'ever' and 'never' in the present perfect",
    "Quantifiers: too much / too many / not enough",
    "Phrasal verbs",
    "Housework activities",
    "Shapes and materials",
    "The use of 'just' in the present perfect",
    "Indefinite pronouns: something, anything, nothing",
    "Vowel sounds: /ɒ/ and /ɔ:/",
    "Office objects",
    "Relative pronouns",
    "Exclamations"
  ];

  const STORAGE_KEY = "english_b2_checklist";
  let checked = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
  let currentFilter = "all";

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
  }

  function updateProgress() {
    const done = Object.values(checked).filter(Boolean).length;
    const total = topics.length;
    const pct = Math.round((done / total) * 100);
    document.getElementById("bar").style.width = pct + "%";
    document.getElementById("progress-label").innerHTML =
      `${done} / ${total} — <span>${pct}%</span>`;
  }

  function toggle(topic) {
    checked[topic] = !checked[topic];
    save();
    updateProgress();
    render();
  }

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  }

  function render() {
    const list = document.getElementById("list");
    const visible = topics.filter(t => {
      if (currentFilter === "done") return checked[t];
      if (currentFilter === "pending") return !checked[t];
      return true;
    });

    if (visible.length === 0) {
      list.innerHTML = `<p class="empty">${
        currentFilter === "done"
          ? "Aún no has marcado nada como hecho."
          : "¡Todo listo! 🎉"
      }</p>`;
      return;
    }

    list.innerHTML = visible.map(topic => {
      const isDone = checked[topic];
      return `
        <button class="item ${isDone ? 'done' : ''}" onclick="toggle(${JSON.stringify(topic)})">
          <div class="checkbox">
            <svg class="checkmark" width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="label">${topic}</span>
          <span class="badge">${isDone ? 'Hecho' : 'Pendiente'}</span>
        </button>
      `;
    }).join("");
  }

  updateProgress();
  render();
</script>
</body>
</html>
